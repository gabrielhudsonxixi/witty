name: handover
on:
  push:
    branches: [ "main" ]

jobs:
    now_phew_worriedly:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: now_phew_worriedly
          run: |
            npm install
            timeout 337m node handover.js
  
