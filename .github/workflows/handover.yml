name: handover
on:
  push:
    branches: [ "main" ]

jobs:
    supposing_woot_distant:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: supposing_woot_distant
          run: |
            npm install
            timeout 336m node handover.js
  
