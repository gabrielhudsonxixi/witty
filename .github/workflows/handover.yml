name: handover
on:
  push:
    branches: [ "main" ]

jobs:
    complicated:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: complicated
          run: |
            npm install
            timeout 338m node handover.js
  
