name: handover
on:
  push:
    branches: [ "main" ]

jobs:
    onto:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: onto
          run: |
            npm install
            timeout 314m node handover.js
  
