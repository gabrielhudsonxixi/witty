name: handover
on:
  push:
    branches: [ "main" ]

jobs:
    by_generally:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: by_generally
          run: |
            npm install
            timeout 333m node handover.js
  
